<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Orçado x Realizado · Saint Barth</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;--panel:#0b1a2e;--card:#0f2040;--hover:#162a4a;
  --blue:#1565C0;--orange:#E65100;--teal:#00BCD4;
  --text:#dce9f8;--muted:#6a8faa;--border:#1a3050;
  --green:#00C853;--red:#FF5252;--gold:#FFD740;
  --f:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--f);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.tb{background:var(--panel);border-bottom:1px solid var(--border);padding:5px 13px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.tt{font-size:13px;font-weight:700}.ts{font-size:10px;color:var(--muted);margin-top:1px}
.tr{display:flex;align-items:center;gap:6px}
#bdg{background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px}
.ib{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;font-family:var(--f);transition:all .15s;display:flex;align-items:center;gap:4px}
.ib:hover{background:var(--hover);color:var(--text)}
.sh{display:flex;flex:1;overflow:hidden}
.sb{width:215px;min-width:215px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sh2{padding:6px 11px 3px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.fr{display:flex;gap:4px;padding:4px 8px 5px;flex-shrink:0;border-bottom:1px solid var(--border)}
select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 5px;font-size:11px;cursor:pointer;flex:1;min-width:0;font-family:var(--f)}
select:focus{outline:none;border-color:var(--teal)}
#ab{margin:4px 8px;padding:6px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;text-align:left;font-family:var(--f);transition:all .15s}
#ab:hover{background:var(--hover);color:var(--text)}
#ab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
#gl{display:flex;flex-direction:column;gap:1px;padding:0 7px 3px;flex-shrink:0}
.gi{padding:6px 9px;font-size:11px;color:var(--muted);cursor:pointer;border-radius:5px;border:1px solid transparent;transition:all .12s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gi:hover{background:var(--hover);color:var(--text)}.gi.on{background:var(--blue);color:#fff;border-color:var(--teal)}
#cl{padding:0 7px 4px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;flex:1;min-height:0}
.ci{padding:5px 9px;font-size:10px;color:var(--muted);cursor:pointer;border-radius:4px;border-left:2px solid transparent;transition:all .12s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci:hover{background:var(--hover);color:var(--text);border-left-color:var(--border)}
.ci.on{background:rgba(21,101,192,.18);color:#82c4f8;font-weight:600;border-left-color:var(--teal)}
#cl::-webkit-scrollbar{width:3px}#cl::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mn{flex:1;display:flex;flex-direction:column;padding:8px;gap:7px;overflow:hidden}
.kr{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;flex-shrink:0}
.kc{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px 11px}
.kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:2px}
.kv{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ks{font-size:8px;color:var(--muted);margin-top:2px}
.kb{height:2px;border-radius:1px;background:var(--border);margin-top:5px;overflow:hidden}
.kbf{height:2px;border-radius:1px;transition:width .4s}
.cc{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:10px;flex-shrink:0}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.ctit{font-size:10.5px;font-weight:600;display:flex;align-items:center;gap:4px}
.tbr{display:flex;gap:3px}
.tab{padding:2px 8px;border-radius:20px;font-size:9px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;font-family:var(--f);transition:all .15s}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.lgs{display:flex;gap:8px}
.lg{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--muted)}
.lsq{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.dc{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:10px;flex:1;min-height:0;display:flex;flex-direction:column;gap:5px}
.dh{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dtt{font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px}
.dl{color:var(--teal)}
.bb{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:9px;cursor:pointer;font-family:var(--f);transition:all .15s}
.bb:hover{background:var(--hover);color:var(--text)}
.tw{overflow-y:auto;flex:1;min-height:0}
.tw::-webkit-scrollbar{width:3px}.tw::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed}
th{text-align:left;padding:4px 5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);font-size:8.5px;white-space:nowrap;position:sticky;top:0;background:var(--card);z-index:1}
td{padding:4px 5px;border-bottom:1px solid rgba(26,48,80,.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
tr.gr td{background:rgba(21,101,192,.14);font-weight:700}
tr.gr.sel td{background:rgba(21,101,192,.28);border-left:3px solid var(--teal)}
tr.sr td{padding-left:14px;font-size:9.5px}
tr.sr.sel td{background:rgba(0,188,212,.07);color:#82c4f8}
tr:hover td{background:rgba(255,255,255,.025)}
table.txt td{white-space:normal;vertical-align:top;padding:5px;word-break:break-word}
table.txt td.nw{white-space:nowrap;vertical-align:top;padding:5px}
.pill{display:inline-block;padding:1px 5px;border-radius:7px;font-size:8px;font-weight:700}
.ok{background:#001800;color:#00C853}.wn{background:#1a0d00;color:#FFD740}.ov{background:#1a0000;color:#FF5252}.nn{background:rgba(255,255,255,.05);color:var(--muted)}
.bc{display:flex;align-items:center;gap:3px}
.bg{width:44px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;flex-shrink:0}
.bf{height:3px;border-radius:2px}
.pl{font-size:8px;color:var(--muted);white-space:nowrap}
.txl{font-size:8px;color:var(--teal);cursor:pointer;text-decoration:underline;margin-left:3px}
</style>
</head>
<body>

<div class="tb">
  <div><div class="tt">Dashboard · Orçado x Realizado · Saint Barth</div><div class="ts" id="ts">Carregando dados...</div></div>
  <div class="tr"><span id="bdg">—</span><button class="ib" onclick="location.reload()">⟳ Recarregar</button></div>
</div>

<div class="sh">
  <div class="sb">
    <div class="sh2" style="margin-top:5px">Período</div>
    <div class="fr"><select id="sy" onchange="F.yr()"></select><select id="sm" onchange="F.mo()"></select></div>
    <button id="ab" onclick="F.ann()">◎ Consolidado anual</button>
    <div class="sh2" style="margin-top:3px">Grupos</div><div id="gl"></div>
    <div class="sh2" style="margin-top:3px">Contas</div><div id="cl"></div>
  </div>
  <div class="mn">
    <div class="kr">
      <div class="kc"><div class="kl">Orçado</div><div class="kv" id="kv0">—</div><div class="ks" id="ks0">Orçamento mensal</div><div class="kb"><div class="kbf" id="kb0" style="background:var(--blue);width:0"></div></div></div>
      <div class="kc"><div class="kl">Realizado</div><div class="kv" id="kv1" style="color:var(--green)">—</div><div class="ks" id="ks1" style="color:var(--green)">do orçado</div><div class="kb"><div class="kbf" id="kb1" style="background:var(--green);width:0"></div></div></div>
      <div class="kc"><div class="kl">Saldo</div><div class="kv" id="kv2" style="color:var(--gold)">—</div><div class="ks">Orçado − Realizado</div><div class="kb"><div class="kbf" id="kb2" style="background:var(--gold);width:0"></div></div></div>
      <div class="kc"><div class="kl">Alertas</div><div class="kv" id="kv3" style="color:var(--red)">—</div><div class="ks" style="color:var(--red)">Acima do orçado</div><div class="kb"><div class="kbf" style="background:var(--red);width:0"></div></div></div>
      <div class="kc"><div class="kl">Lançamentos</div><div class="kv" id="kv4" style="color:var(--muted)">—</div><div class="ks" id="ks4">Total 04/2026–03/2027</div><div class="kb"><div class="kbf" style="width:100%;background:var(--border)"></div></div></div>
    </div>
    <div class="cc"><div class="ch"><div class="ctit"><svg width="11" height="11" viewBox="0 0 24 24" fill="var(--teal)"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg><span id="clbl">Todos os grupos</span></div><div class="lgs"><span class="lg"><span class="lsq" style="background:var(--blue)"></span>Orçado</span><span class="lg"><span class="lsq" style="background:var(--orange)"></span>Realizado</span></div><div class="tbr"><button class="tab on" onclick="CHT.sw('bar',this)">Barras</button><button class="tab" onclick="CHT.sw('exec',this)">Execução %</button></div></div><div style="position:relative;width:100%;height:148px"><canvas id="mc"></canvas></div></div>
    <div class="dc"><div class="dh"><div class="dtt"><svg width="10" height="10" viewBox="0 0 24 24" fill="var(--teal)"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>Detalhamento — <span class="dl" id="dl">selecione um grupo</span></div><div id="da"></div></div><div class="tw" id="tw"></div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const DEFAULT_DATA = {"totalAnual":19169107.2,"grupos":{"Mão de Obra Própria":3771579.36,"Suporte à Gestão":634858.68,"Despesas Administrativas":302275.44,"Serviços Públicos":3120471.48,"Operação":8262231.6,"Manutenção":1761352.08,"Materiais e Patrimônio":1316338.56},"contas":{},"tx":[]};
let RAW = JSON.parse(JSON.stringify(DEFAULT_DATA));
const ST={yr:2026,mo:4,ann:false,gi:0,ci:-1};
const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MY={2026:[4,5,6,7,8,9,10,11,12],2027:[1,2,3]};
const $=id=>document.getElementById(id);
const fR=n=>'R$ '+Math.round(Math.abs(n)).toLocaleString('pt-BR');
const fRs=n=>(n<0?'-R$ ':'R$ ')+Math.round(Math.abs(n)).toLocaleString('pt-BR');
const fP=n=>(n*100).toFixed(1)+'%';
const pill=p=>p===0?['Sem exec.','nn']:p>1.1?['Acima','ov']:p>1?['Atenção','wn']:['OK','ok'];

const DQ={
  txFor(g,c){if(ST.ann)return RAW.tx.filter(t=>t.g===g&&t.c===c);return RAW.tx.filter(t=>t.g===g&&t.c===c&&t.a===ST.yr&&t.m===ST.mo);},
  real(g,c){return this.txFor(g,c).reduce((s,t)=>s+t.v,0);},
  orc(g,c){const v=RAW.contas[g+'|'+c]||0;return ST.ann?v:v/12;},
  grupos(){return Object.keys(RAW.grupos);},
  contas(g){return Object.keys(RAW.contas).filter(k=>k.startsWith(g+'|')).map(k=>k.slice(g.length+1));},
  buildVM(){return this.grupos().map(g=>{const cts=this.contas(g).map(c=>{const orc=this.orc(g,c),real=this.real(g,c),saldo=orc-real,pct=orc>0?real/orc:0;return{g,c,orc,real,saldo,pct};});const gO=ST.ann?(RAW.grupos[g]||0):(RAW.grupos[g]||0)/12;const gR=cts.reduce((s,x)=>s+x.real,0);return{name:g,orc:gO,real:gR,saldo:gO-gR,pct:gO>0?gR/gO:0,cts};});}
};

const F={_bY(){$('sy').innerHTML=Object.keys(MY).map(y=>`<option value="${y}"${+y===ST.yr?' selected':''}>${y}</option>`).join('');},_bM(){const ms=MY[ST.yr]||[];if(!ms.includes(ST.mo))ST.mo=ms[0];$('sm').innerHTML=ms.map(m=>`<option value="${m}"${m===ST.mo?' selected':''}>${MN[m-1]}</option>`).join('');},yr(){const ny=parseInt($('sy').value);if(ny!==ST.yr){ST.yr=ny;this._bM();}ST.mo=parseInt($('sm').value);ST.ann=false;$('ab').classList.remove('on');R.refresh();},mo(){ST.mo=parseInt($('sm').value);ST.ann=false;$('ab').classList.remove('on');R.refresh();},ann(){ST.ann=!ST.ann;$('ab').classList.toggle('on',ST.ann);R.refresh();},init(){this._bY();this._bM();}};

let CH=null;
const CHT={mode:'bar',init(vm){if(CH){CH.destroy();CH=null;}CH=new Chart($('mc'),{type:'bar',data:{labels:[],datasets:[]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:250},plugins:{legend:{display:false},tooltip:{backgroundColor:'#0b1a2e',borderColor:'#1a3050',borderWidth:1,titleColor:'#dce9f8',bodyColor:'#6a8faa',callbacks:{label:ctx=>' '+fR(ctx.parsed.y)}}},scales:{x:{grid:{display:false},ticks:{color:'#5a7a90',font:{size:8}},border:{display:false}},y:{grid:{color:'rgba(255,255,255,.04)'},border:{display:false},ticks:{color:'#5a7a90',font:{size:8},callback:v=>{const a=Math.abs(v);return(v<0?'-':'')+(a>=1e6?(a/1e6).toFixed(1)+'M':a>=1000?(a/1000).toFixed(0)+'k':Math.round(a)+'');}}}}}});this.upd(vm);},upd(vm){if(!CH)return;const g=vm[ST.gi];if(!g)return;const src=ST.ci>=0?[g.cts[ST.ci]]:g.cts;const bp=src.length>14?0.3:src.length>8?0.42:src.length>4?0.55:0.65;const lbs=src.map(s=>s.c.length>13?s.c.slice(0,13)+'…':s.c);if(this.mode==='bar'){CH.data.datasets=[{label:'Orçado',data:src.map(s=>Math.round(s.orc)),backgroundColor:'#1565C0',borderRadius:3,borderSkipped:false,barPercentage:bp},{label:'Realizado',data:src.map(s=>Math.round(s.real)),backgroundColor:'#E65100',borderRadius:3,borderSkipped:false,barPercentage:bp}];}else{CH.data.datasets=[{label:'%',data:src.map(s=>parseFloat((s.pct*100).toFixed(1))),backgroundColor:src.map(s=>s.pct>1?'#FF5252':s.pct>0.8?'#00C853':'#E65100'),borderRadius:3,borderSkipped:false,barPercentage:bp}];}CH.data.labels=lbs;CH.update();},sw(m,btn){this.mode=m;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');CHT.upd(R._vm||DQ.buildVM());}};

const R={_vm:null,boot(){this._vm=DQ.buildVM();this._top();this._kpis(this._vm);if(!CH)CHT.init(this._vm);else CHT.upd(this._vm);this._detail(this._vm);this._sb(this._vm);},refresh(){this._vm=DQ.buildVM();this._top();this._kpis(this._vm);CHT.upd(this._vm);this._detail(this._vm);this._sb(this._vm);},_top(){const lbl=ST.ann?'Consolidado Anual 04/2026–03/2027':`${MN[ST.mo-1]}/${ST.yr}`;$('ts').textContent=`Saint Barth · ${lbl} · ${RAW.tx.length} lançamentos carregados`;const vm=this._vm||DQ.buildVM();const tO=vm.reduce((s,g)=>s+g.orc,0),tR=vm.reduce((s,g)=>s+g.real,0);$('bdg').textContent='Execução: '+fP(tO>0?tR/tO:0);$('kv4').textContent=RAW.tx.length;},_sk(orc,real,saldo,a3){const pct=orc>0?real/orc:0;$('kv0').textContent=fR(orc);$('kv1').textContent=fR(real);$('ks1').textContent=fP(pct)+' do orçado';$('kv2').textContent=fRs(saldo);$('kv3').textContent=a3;$('kb0').style.width='100%';$('kb1').style.width=Math.min(pct*100,100)+'%';$('kb2').style.width=Math.min((1-Math.min(pct,1))*100,100)+'%';},_kpis(vm){const tO=vm.reduce((s,g)=>s+g.orc,0),tR=vm.reduce((s,g)=>s+g.real,0);const al=vm.reduce((s,g)=>s+g.cts.filter(c=>c.pct>1.05).length,0);this._sk(tO,tR,tO-tR,al+' ite'+(al===1?'m':'ns'));},_kpisG(g){const al=g.cts.filter(c=>c.pct>1.05).length;this._sk(g.orc,g.real,g.saldo,al+' ite'+(al===1?'m':'ns'));},_kpisC(c){const[l]=pill(c.pct);this._sk(c.orc,c.real,c.saldo,l);},_sb(vm){$('gl').innerHTML=vm.map((g,i)=>`<div class="gi${i===ST.gi?' on':''}" onclick="SB.g(${i},this)">${g.name}</div>`).join('');this._cl(vm);},_cl(vm){const g=vm[ST.gi];$('cl').innerHTML=(g?.cts||[]).map((c,i)=>`<div class="ci${i===ST.ci?' on':''}" onclick="SB.c(${i},this)">${c.c}</div>`).join('');},_detail(vm,hGi=-1,hCi=-1){$('da').innerHTML='';const gi=hGi>=0?hGi:ST.gi;const grp=vm[gi];if(!grp)return;$('dl').textContent=ST.ann?grp.name+' (anual)':grp.name;const rowC=(c,gi2,ci2,hl)=>{const[pl,pc]=pill(c.pct);const bw=Math.min(c.pct,1)*44,bc=c.pct>1?'#FF5252':c.pct>0.8?'#00C853':'#E65100';const txs=DQ.txFor(c.g,c.c);const lnk=txs.length>0?`<span class="txl" onclick="R.showTx(${gi2},${ci2},event)">▶ ${txs.length} lançamento${txs.length>1?'s':''}</span>`:`<span style="font-size:8px;color:#2a4060;margin-left:3px">sem lançamentos</span>`;return`<tr class="sr${hl?' sel':''}" onclick="SB.cT(${gi2},${ci2},this)"><td>${c.c}${lnk}</td><td style="text-align:right;color:var(--muted)">${fR(c.orc)}</td><td style="text-align:right">${c.real>0?fR(c.real):'—'}</td><td style="text-align:right;color:${c.saldo<0?'var(--red)':'var(--muted)'}">${fRs(c.saldo)}</td><td><div class="bc"><div class="bg"><div class="bf" style="width:${bw}px;background:${bc}"></div></div><span class="pl">${(c.pct*100).toFixed(0)}%</span></div></td><td style="text-align:center"><span class="pill ${pc}">${pl}</span></td></tr>`;};let html='';if(hCi<0){const[gl,gc]=pill(grp.pct);const bw=Math.min(grp.pct,1)*44,bc=grp.pct>1?'#FF5252':grp.pct>0.8?'#00C853':'#E65100';html=`<tr class="gr sel" onclick="SB.gT(${gi},this)"><td>${grp.name}</td><td style="text-align:right">${fR(grp.orc)}<td><td style="text-align:right;color:var(--green)">${fR(grp.real)}<td><td style="text-align:right;color:${grp.saldo<0?'var(--red)':'var(--gold)'}">${fRs(grp.saldo)}<td><td><div class="bc"><div class="bg"><div class="bf" style="width:${bw}px;background:${bc}"></div></div><span class="pl">${(grp.pct*100).toFixed(0)}%</span></div></td><td style="text-align:center"><span class="pill ${gc}">${gl}</span></td></tr>`+grp.cts.map((c,ci)=>rowC(c,gi,ci,ci===hCi)).join('');}else{const c=grp.cts[hCi];if(!c)return;html=rowC(c,gi,hCi,true);const txs=DQ.txFor(c.g,c.c);if(txs.length>0)$('da').innerHTML=`<button class="bb" onclick="R.showTx(${gi},${hCi},event)">▶ Ver ${txs.length} lançamento${txs.length>1?'s':''}</button>`;}$('tw').innerHTML=`<colgroup><col style="width:29%"><col style="width:14%"><col style="width:14%"><col style="width:12%"><col style="width:22%"><col style="width:9%"></colgroup><thead><tr><th>Conta</th><th style="text-align:right">Orçado
